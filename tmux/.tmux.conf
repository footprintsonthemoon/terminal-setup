##### Prefix ############################################################

set -g prefix C-a
unbind C-b
bind C-a send-prefix

##### Basis #############################################################

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g history-limit 100000

##### Terminal / Farben #################################################

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

##### Maus / Scrollen / Clipboard ######################################

set -g mouse on
set -g set-clipboard on
setw -g synchronize-panes off
setw -g mode-keys vi

##### Pane-Raender / Titel #############################################

set -g pane-border-status top
set -g pane-border-format " #{?pane_active,● ,}#{pane_title} "
set -g pane-border-style fg=#45475a
set -g pane-active-border-style fg=#45475a

##### Splits im aktuellen Verzeichnis ##################################

bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

##### Pane-Navigation ohne Prefix ######################################

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

##### Window-Navigation #################################################

bind -n M-h previous-window
bind -n M-l next-window

##### Resize mit Prefix #################################################

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Copy-Mode (vi-artig) #############################################

bind [ copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi WheelUpPane send -X scroll-up
bind -T copy-mode-vi WheelDownPane send -X scroll-down

# macOS Clipboard Integration
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

##### Reload ############################################################

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf neu geladen"

##### Statusleiste ######################################################

set -g status-position bottom
set -g status-interval 5
set -g status-style bg=#1e1e2e,fg=#cdd6f4

set -g status-left-length 40
set -g status-right-length 100

# Links: Session
set -g status-left "#[fg=#a6e3a1,bold] #S "

# Fensterliste
set -g window-status-separator ""
set -g window-status-format " #[fg=#6c7086]#I:#W "
set -g window-status-current-format " #[fg=#11111b,bg=#fab387,bold] #I:#W #[fg=#fab387,bg=#1e1e2e,nobold]"

# Rechts: Host, Datum, Uhrzeit
set -g status-right "#[fg=#89b4fa]#H #[fg=#a6adc8]%Y-%m-%d #[fg=#f9e2af]%H:%M "

# Meldungen / Copy-Mode
set -g message-style fg=#cdd6f4,bg=#313244
set -g mode-style fg=#11111b,bg=#89b4fa

##### Plugins ###########################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'catppuccin/tmux'
# set -g @catppuccin_flavour 'mocha'

run '~/.tmux/plugins/tpm/tpm'