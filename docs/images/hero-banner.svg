    <text x="18" y="92" fill="#a6e3a1" font-family="JetBrains Mono, Menlo, monospace" font-size="18">❯ nvim</text>
    <text x="18" y="124" fill="#f5c2e7" font-family="JetBrains Mono, Menlo, monospace" font-size="18">❯ &lt;leader&gt;e  # Neo-tree</text>
