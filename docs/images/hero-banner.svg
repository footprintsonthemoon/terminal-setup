<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11111b"/>
      <stop offset="1" stop-color="#1e1e2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="90" x2="1420" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#89b4fa"/>
      <stop offset="0.35" stop-color="#cba6f7"/>
      <stop offset="0.7" stop-color="#fab387"/>
      <stop offset="1" stop-color="#a6e3a1"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1600" height="420" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>
  <rect width="1600" height="420" rx="28" fill="url(#bg)"/>
  <g filter="url(#blur)" opacity="0.35">
    <circle cx="260" cy="110" r="120" fill="#89b4fa"/>
    <circle cx="790" cy="70" r="130" fill="#cba6f7"/>
