  <text x="122" y="165" fill="#cdd6f4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">Terminal Setup</text>
  <text x="124" y="214" fill="#a6adc8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">tmux · Neovim · Starship · Stream Deck</text>
  <text x="124" y="266" fill="#bac2de" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Keyboard-first · Symlink-based · Catppuccin-styled · Reproducible</text>
  <g transform="translate(980 118)">
    <rect width="410" height="150" rx="16" fill="#1e1e2e" stroke="#45475a"/>
